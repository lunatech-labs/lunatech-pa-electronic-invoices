<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Ferrite</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
        }
        .brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .brand img { width: 56px; height: 56px; }
        .brand h1 {
            font-size: 1.4rem;
            margin-top: 0.5rem;
            color: #1a1a2e;
        }
        .brand p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }
        form { display: flex; flex-direction: column; gap: 0.8rem; }
        label {
            font-size: 0.85rem;
            color: #555;
            font-weight: 500;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        input:focus {
            outline: none;
            border-color: #16213e;
            box-shadow: 0 0 0 3px rgba(22, 33, 62, 0.1);
        }
        button {
            background: #16213e;
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #0f1828; }
        .err {
            background: #ffebee;
            color: #c62828;
            padding: 0.7rem;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .footer {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <img src="/favicon.png" alt="Ferrite">
            <h1>Ferrite</h1>
            <p>Plateforme Agréée — connexion</p>
        </div>
        <!--ERR-->
        <form method="post" action="/login">
            <label>
                Email
                <input type="email" name="email" required autofocus autocomplete="email">
            </label>
            <label>
                Mot de passe
                <input type="password" name="password" required autocomplete="current-password">
            </label>
            <button type="submit">Se connecter</button>
        </form>
        <div class="footer">
            Pas de compte ? Contactez l'administrateur PDP.
        </div>
    </div>
</body>
</html>
