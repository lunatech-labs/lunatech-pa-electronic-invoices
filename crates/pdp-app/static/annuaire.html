<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire PPF</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        header p { opacity: 0.7; margin-top: 0.3rem; font-size: 0.9rem; }

        .search-container {
            max-width: 800px;
            margin: -1.5rem auto 2rem;
            padding: 0 1rem;
            position: relative;
        }
        .search-box {
            width: 100%;
            padding: 1rem 1.2rem 1rem 3rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            outline: none;
            transition: box-shadow 0.2s;
        }
        .search-box:focus {
            box-shadow: 0 4px 25px rgba(22, 33, 62, 0.25);
        }
        .search-box::placeholder { color: #aaa; }
        .search-icon {
            position: absolute;
            left: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .stats-bar {
            max-width: 800px;
            margin: 0 auto 1rem;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #666;
        }

        .results {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }
        .result-card {
            background: white;
            border-radius: 10px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 0.8rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: box-shadow 0.15s, transform 0.15s;
        }
        .result-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }
        .result-card.expanded {
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        .result-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #1a1a2e;
        }
        .result-siren {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #5a67d8;
            background: #ebf4ff;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            white-space: nowrap;
        }
        .result-meta {
            margin-top: 0.4rem;
            font-size: 0.85rem;
            color: #888;
        }
        .result-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.1rem 0.45rem;
            border-radius: 3px;
            margin-right: 0.3rem;
        }
        .badge-pdp {
            background: #e6fffa;
            color: #234e52;
        }
        .badge-type {
            background: #fef3c7;
            color: #92400e;
        }
        .badge-status {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-status.inactif {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-b2g {
            background: #ede9fe;
            color: #5b21b6;
        }
        .badge-routage {
            background: #dbeafe;
            color: #1e40af;
            font-family: monospace;
        }

        .detail-section {
            display: none;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }
        .result-card.expanded .detail-section {
            display: block;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }
        @media (max-width: 600px) {
            .detail-grid { grid-template-columns: 1fr; }
        }
        .detail-item {
            font-size: 0.85rem;
        }
        .detail-label {
            color: #999;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .detail-value {
            color: #333;
            margin-top: 0.1rem;
        }

        .etab-list {
            margin-top: 0.8rem;
        }
        .etab-list h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #999;
            margin-bottom: 0.5rem;
        }
        .etab-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.85rem;
        }
        .etab-row:last-child { border-bottom: none; }
        .etab-siret {
            font-family: monospace;
            color: #5a67d8;
            font-size: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #aaa;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .spinner {
            display: none;
            text-align: center;
            padding: 2rem;
            color: #999;
        }
        .spinner.visible { display: block; }
        .spinner::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #ddd;
            border-top-color: #5a67d8;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:0.5rem">
            <svg width="40" height="40" viewBox="52 18 112 128" xmlns="http://www.w3.org/2000/svg">
                <polygon points="108,18 164,50 164,114 108,146 52,114 52,50" fill="#26215C" stroke="#7F77DD" stroke-width="2.5"/>
                <polygon points="108,38 138,55 138,91 108,108 78,91 78,55" fill="#3C3489"/>
                <polygon points="138,55 164,50 164,114" fill="#534AB7" opacity="0.5"/>
                <line x1="84" y1="66" x2="132" y2="66" stroke="#CECBF6" stroke-width="3" stroke-linecap="round"/>
                <line x1="84" y1="79" x2="110" y2="79" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
                <line x1="116" y1="79" x2="132" y2="79" stroke="#CECBF6" stroke-width="2" stroke-linecap="round"/>
                <line x1="84" y1="92" x2="120" y2="92" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
                <circle cx="113" cy="79" r="4.5" fill="#EF9F27"/>
                <circle cx="132" cy="92" r="3.5" fill="#1D9E75"/>
            </svg>
            <h1>Ferrite <span style="font-weight:300;opacity:0.7">Annuaire PPF</span></h1>
        </div>
        <p>Recherche dans l'annuaire des assujettis</p>
    </header>

    <div class="search-container">
        <span class="search-icon">&#128269;</span>
        <input type="text" class="search-box" id="searchInput"
               placeholder="Nom, SIREN, SIRET ou adresse..."
               autocomplete="off" autofocus>
    </div>

    <div class="stats-bar">
        <span id="resultCount"></span>
        <span id="searchTime"></span>
    </div>

    <div class="spinner" id="spinner"></div>

    <div class="results" id="results">
        <div class="empty-state">
            <div class="icon">&#128218;</div>
            <p>Saisissez un nom, SIREN, SIRET ou adresse pour rechercher</p>
        </div>
    </div>

    <script src="/ui/static/annuaire.js"></script>
</body>
</html>
