<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire PPF</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif&display=swap');
        :root {
            --bg: #FAFAF7;
            --bg-2: #F3F2EC;
            --ink: #0E0E0C;
            --ink-2: #2A2A26;
            --muted: #6B6A62;
            --muted-2: #9B9A91;
            --line: #E5E3DA;
            --line-2: #D9D6CB;
            --card: #FFFFFF;
            --accent: oklch(0.62 0.16 35);
            --accent-soft: oklch(0.95 0.04 50);
            --accent-ink: oklch(0.42 0.14 35);
            --good: oklch(0.55 0.12 150);
            --good-soft: oklch(0.95 0.04 150);
            --good-ink: #1E6A45;
            --warn-soft: oklch(0.96 0.05 75);
            --warn-ink: #7A5A14;
            --bad-soft: oklch(0.95 0.05 25);
            --bad-ink: #8A2A1E;
            --radius: 10px;
            --radius-sm: 6px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: var(--accent); color: #fff; }
        body {
            font-family: 'Geist','Inter',-apple-system,system-ui,sans-serif;
            font-feature-settings: 'ss01','cv11';
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            letter-spacing: -0.005em;
        }
        header {
            background: rgba(250,250,247,.85);
            backdrop-filter: saturate(140%) blur(10px);
            -webkit-backdrop-filter: saturate(140%) blur(10px);
            border-bottom: 1px solid var(--line);
            color: var(--ink);
            padding: 1.4rem 2rem 1.6rem;
            text-align: center;
        }
        header h1 { font-size: 1.4rem; font-weight: 500; letter-spacing: -0.02em; color: var(--ink); }
        header p { color: var(--muted); margin-top: 0.4rem; font-size: 12.5px; }

        .search-container {
            max-width: 800px;
            margin: 1.6rem auto 1.4rem;
            padding: 0 1rem;
            position: relative;
        }
        .search-box {
            width: 100%;
            padding: 0.85rem 1.1rem 0.85rem 2.8rem;
            font-size: 14.5px;
            font-family: inherit;
            color: var(--ink);
            background: #fff;
            border: 1px solid var(--line-2);
            border-radius: var(--radius);
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        .search-box:focus {
            border-color: var(--ink-2);
            box-shadow: 0 0 0 3px rgba(15,15,12,.06);
        }
        .search-box::placeholder { color: var(--muted-2); }
        .search-icon {
            position: absolute;
            left: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-2);
            font-size: 1rem;
            pointer-events: none;
        }

        .stats-bar {
            max-width: 800px;
            margin: 0 auto 0.8rem;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            font-family: 'Geist Mono',monospace;
        }

        .results {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }
        .result-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 1.05rem 1.3rem;
            margin-bottom: 0.65rem;
            cursor: pointer;
            transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
        }
        .result-card:hover {
            border-color: var(--ink-2);
            box-shadow: 0 1px 0 rgba(15,15,12,.04), 0 8px 24px -16px rgba(15,15,12,.10);
            transform: translateY(-1px);
        }
        .result-card.expanded {
            border-color: var(--ink-2);
            box-shadow: 0 1px 0 rgba(15,15,12,.04), 0 12px 32px -16px rgba(15,15,12,.14);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        .result-name {
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: -0.01em;
            color: var(--ink);
        }
        .result-siren {
            font-family: 'Geist Mono',monospace;
            font-size: 11.5px;
            color: var(--accent-ink);
            background: var(--accent-soft);
            border: 1px solid oklch(0.86 0.06 50);
            padding: 1px 7px;
            border-radius: 999px;
            white-space: nowrap;
            font-weight: 500;
        }
        .result-meta {
            margin-top: 0.4rem;
            font-size: 12.5px;
            color: var(--muted);
        }
        .result-badge {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            font-weight: 500;
            padding: 1px 7px;
            border-radius: 999px;
            margin-right: 0.3rem;
            border: 1px solid transparent;
        }
        .badge-pdp     { background: var(--good-soft); color: var(--good-ink); border-color: oklch(0.85 0.08 150); }
        .badge-type    { background: var(--warn-soft); color: var(--warn-ink); border-color: oklch(0.85 0.07 75); }
        .badge-status  { background: var(--good-soft); color: var(--good-ink); border-color: oklch(0.85 0.08 150); }
        .badge-status.inactif { background: var(--bad-soft); color: var(--bad-ink); border-color: oklch(0.85 0.08 25); }
        .badge-b2g     { background: var(--accent-soft); color: var(--accent-ink); border-color: oklch(0.86 0.06 50); }
        .badge-routage { background: #fff; color: var(--ink-2); border-color: var(--line-2); font-family: 'Geist Mono',monospace; }

        .detail-section {
            display: none;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--line);
        }
        .result-card.expanded .detail-section {
            display: block;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }
        @media (max-width: 600px) {
            .detail-grid { grid-template-columns: 1fr; }
        }
        .detail-item {
            font-size: 13px;
        }
        .detail-label {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
        .detail-value {
            color: var(--ink);
            margin-top: 0.15rem;
        }

        .etab-list {
            margin-top: 0.8rem;
        }
        .etab-list h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .etab-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--line);
            font-size: 12.5px;
        }
        .etab-row:last-child { border-bottom: none; }
        .etab-siret {
            font-family: 'Geist Mono',monospace;
            color: var(--accent-ink);
            font-size: 11.5px;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted-2);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .spinner {
            display: none;
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }
        .spinner.visible { display: block; }
        .spinner::after {
            content: '';
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2px solid var(--line);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:0.5rem">
            <svg width="40" height="40" viewBox="52 18 112 128" xmlns="http://www.w3.org/2000/svg">
                <polygon points="108,18 164,50 164,114 108,146 52,114 52,50" fill="#26215C" stroke="#7F77DD" stroke-width="2.5"/>
                <polygon points="108,38 138,55 138,91 108,108 78,91 78,55" fill="#3C3489"/>
                <polygon points="138,55 164,50 164,114" fill="#534AB7" opacity="0.5"/>
                <line x1="84" y1="66" x2="132" y2="66" stroke="#CECBF6" stroke-width="3" stroke-linecap="round"/>
                <line x1="84" y1="79" x2="110" y2="79" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
                <line x1="116" y1="79" x2="132" y2="79" stroke="#CECBF6" stroke-width="2" stroke-linecap="round"/>
                <line x1="84" y1="92" x2="120" y2="92" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
                <circle cx="113" cy="79" r="4.5" fill="#EF9F27"/>
                <circle cx="132" cy="92" r="3.5" fill="#1D9E75"/>
            </svg>
            <h1>Ferrite <span style="font-weight:300;opacity:0.7">Annuaire PPF</span></h1>
        </div>
        <p>Recherche dans l'annuaire des assujettis</p>
    </header>

    <div class="search-container">
        <span class="search-icon">&#128269;</span>
        <input type="text" class="search-box" id="searchInput"
               placeholder="Nom, SIREN, SIRET ou adresse..."
               autocomplete="off" autofocus>
    </div>

    <div class="stats-bar">
        <span id="resultCount"></span>
        <span id="searchTime"></span>
    </div>

    <div class="spinner" id="spinner"></div>

    <div class="results" id="results">
        <div class="empty-state">
            <div class="icon">&#128218;</div>
            <p>Saisissez un nom, SIREN, SIRET ou adresse pour rechercher</p>
        </div>
    </div>

    <script src="/ui/static/annuaire.js"></script>
</body>
</html>
