# Configuration minimale pour démo UI Phase 1.
# Pas de PostgreSQL ni Elasticsearch requis — le serveur démarre quand même
# et les pages /ui affichent des messages de fallback propres.

pdp:
  id: PDP-DEMO-UI
  name: "Ferrite Démo UI"
  matricule: "0001"
  siret: "12345678901234"

elasticsearch:
  url: "http://localhost:9200"

# PostgreSQL pour l'annuaire PPF (démo : 500 entreprises chargées via F14)
database:
  url: "postgresql://pdp:pdp@localhost:5432/pdp"
  max_connections: 5

validation:
  specs_dir: ./specs
  xsd_enabled: false
  en16931_enabled: false
  br_fr_enabled: false

http_server:
  host: "127.0.0.1"
  port: 8080
  # `dev_open: true` autorise toutes les requêtes sans Bearer token et leur
  # donne un contexte admin. C'est ce qui permet à `pdp demo populate`,
  # aux screenshots du README et à l'exploration locale de fonctionner sans
  # configurer de tokens.
  #
  # ⚠️ NE JAMAIS activer `dev_open: true` en production : un client
  # quelconque peut alors consulter n'importe quel SIREN sans
  # authentification. En prod, mettre `dev_open: false` et configurer
  # `tokens:` avec liaison `allowed_sirens` pour chaque porteur.
  dev_open: true
  # Exemple de configuration de tokens (clients API) en mode prod :
  # tokens:
  #   - token: "tok-techconseil-readonly"
  #     principal: "techconseil-app"
  #     allowed_sirens: ["123456789"]
  #     role: tenant
  #   - token: "tok-pdp-support"
  #     principal: "support-team"
  #     role: pdp_operator
  #
  # Exemple d'utilisateurs (login web) :
  # session_secret: "<32+ octets aléatoires, gardé secret>"
  # session_ttl_secs: 28800
  # users:
  #   - email: "alice@techconseil.fr"
  #     password: "..."
  #     principal: "alice@tc"
  #     allowed_sirens: ["123456789"]
  #     role: tenant

routes: []

polling:
  interval_secs: 60

logging:
  format: text
  level: info
