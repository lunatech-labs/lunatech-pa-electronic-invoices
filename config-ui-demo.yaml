# Configuration minimale pour démo UI Phase 1.
# Pas de PostgreSQL ni Elasticsearch requis — le serveur démarre quand même
# et les pages /ui affichent des messages de fallback propres.

pdp:
  id: PDP-DEMO-UI
  name: "Ferrite Démo UI"
  matricule: "0001"
  siret: "12345678901234"

elasticsearch:
  url: "http://localhost:9200"

# PostgreSQL pour l'annuaire PPF (démo : 500 entreprises chargées via F14)
database:
  url: "postgresql://pdp:pdp@localhost:5432/pdp"
  max_connections: 5

validation:
  specs_dir: ./specs
  xsd_enabled: false
  en16931_enabled: false
  br_fr_enabled: false

http_server:
  host: "127.0.0.1"
  port: 8080
  # Secret HMAC pour signer les cookies de session du login web. En prod,
  # remplacer par une chaîne aléatoire d'au moins 32 octets gardée secrète.
  session_secret: "demo-session-secret-32-bytes-padding-padding"
  session_ttl_secs: 28800  # 8 heures
  # Comptes de démo accessibles via `/login`. Mot de passe en clair pour
  # ne pas alourdir le setup local — en prod, utiliser un hash argon2id
  # (commande `pdp hash-password <plaintext>`).
  users:
    - email: "admin@ferrite.demo"
      password: "admin"
      principal: "admin"
      role: pdp_admin
    # Les comptes tenant sont câblés sur des SIRENs qui existent dans
    # l'annuaire F14 démo ET pour lesquels les fixtures `tests/fixtures/`
    # contiennent des factures (en tant que vendeur ET acheteur).
    # `pdp demo seed` peuple l'annuaire + injecte les fixtures.
    - email: "alice@techconseil.demo"
      password: "alice"
      principal: "alice@techconseil"
      allowed_sirens: ["123456789"]  # TechConseil SAS — 244 factures
      role: tenant
    - email: "charlotte@solutions.demo"
      password: "charlotte"
      principal: "charlotte@solutions"
      allowed_sirens: ["109009309"]  # Charlotte Solutions SCI
      role: tenant
    - email: "dupont@menuiserie.demo"
      password: "dupont"
      principal: "dupont@menuiserie"
      allowed_sirens: ["111222333"]  # Menuiserie Artisanale Dupont EURL
      role: tenant
  # Bearer tokens pour clients API. Le token `tok-demo-admin` est utilisé
  # par défaut par `pdp demo seed` pour pousser les fixtures via l'API.
  tokens:
    - token: "tok-demo-admin"
      principal: "demo-seeder"
      role: pdp_admin

routes: []

# Répertoire de stockage des entreprises (un sous-dossier par SIREN).
# Permet les écrans d'administration `/ui/admin/*` (réservés au rôle
# `pdp_admin` — se connecter avec `admin@ferrite.demo` / `admin`).
tenants_dir: tenants

polling:
  interval_secs: 60

logging:
  format: text
  level: info
