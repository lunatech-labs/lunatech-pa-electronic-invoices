# =============================================================================
# Oxalis AS4 — Configuration pour environnement de test local
# =============================================================================
#
# Cette configuration est utilisée par le conteneur Docker Oxalis pour
# les tests d'intégration PEPPOL inter-PDP en local.
#
# Documentation : https://github.com/OxalisCommunity/oxalis

# --- Keystore (identité de l'Access Point) ---
oxalis.keystore {
    path = oxalis-keystore.jks
    password = changeit
    key.alias = ap
    key.password = changeit
}

# --- Truststore (PKI PEPPOL) ---
# En mode test local, on réutilise le keystore comme truststore
security.truststore.ap = oxalis-keystore.jks
security.truststore.smp = oxalis-keystore.jks
security.truststore.password = changeit
security.pki = /pki/local.xml

# --- Lookup (SMP/SML) ---
# En local Docker, on utilise un SMP statique (phoss-smp) au lieu du SML DNS
lookup.locator.class = network.oxalis.vefa.peppol.lookup.locator.StaticLocator
lookup.locator.hostname = smp
lookup.locator.uri = "http://smp:8080"

# --- Réception (inbound) ---
oxalis.path.inbound = /oxalis/inbound

# --- Logging ---
oxalis.logging.config = /oxalis/conf/conf/logback.xml
