# =============================================================================
# Oxalis AS4 — Configuration pour environnement de test local
# =============================================================================
#
# Cette configuration est utilisée par le conteneur Docker Oxalis pour
# les tests d'intégration PEPPOL inter-PDP en local.
#
# Documentation : https://github.com/OxalisCommunity/oxalis/blob/master/doc/installation.md

# --- Identité de l'Access Point ---
# En mode test, on utilise le keystore de test fourni par Oxalis
oxalis.keystore {
    # Le keystore de test est embarqué dans l'image Docker
    path = /oxalis/conf/oxalis-keystore.jks
    password = changeit
    key.alias = ap
    key.password = changeit
}

# --- Réception (inbound) ---
# Les messages reçus sont stockés dans le filesystem
oxalis.path.inbound = /oxalis/inbound

# --- Mode de persistance ---
# filesystem = stocke les messages reçus en fichiers XML
oxalis.persister.handler.class = no.difi.oxalis.as4.inbound.OxalisAS4InboundHandler

# --- Logging ---
oxalis.logging.config = /oxalis/conf/logback.xml

# --- Mode test ---
# Utilise le SML de test (acc.edelivery.tech.ec.europa.eu)
oxalis.sml.hostname = acc.edelivery.tech.ec.europa.eu

# --- Lookup ---
oxalis.lookup.locator.hostname = acc.edelivery.tech.ec.europa.eu
