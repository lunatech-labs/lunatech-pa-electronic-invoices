# =============================================================================
# phoss-smp — Configuration pour test local PEPPOL
# =============================================================================

# Backend XML (pas de base de données)
smp.backend=xml

# Forcer le contexte racine (pas de /smp prefix)
smp.forceroot=true

# API REST writable (pour enregistrer les participants)
smp.rest.writableapi.disabled=false

# Type de réponse REST : Peppol
smp.rest.type=peppol

# Identifiants : mode simple (pas de validation stricte Peppol)
smp.identifiertype=simple

# Keystore pour signer les réponses XML
smp.keystore.type=JKS
smp.keystore.path=/config/smp-keystore.jks
smp.keystore.password=changeit
smp.keystore.key.alias=ap
smp.keystore.key.password=changeit

# Pas de SML (mode local)
sml.active=false
sml.enabled=false
sml.smpid=TEST-SMP

# Pas de Directory
smp.peppol.directory.integration.enabled=false
